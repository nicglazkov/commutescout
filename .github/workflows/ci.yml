name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,demo]" -c constraints.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: Dependency vulnerability audit
        run: |
          pip install pip-audit
          # Audit the installed environment (the real ship target on
          # Linux). Exits non-zero on any known vulnerability. Not using
          # -r constraints.txt: that file pins the Windows-only pywin32,
          # which pip-audit's requirements mode fails to install on the
          # Linux runner. Not using --strict: the only un-auditable
          # entry is this repo's own editable package, which is fine.
          pip-audit
