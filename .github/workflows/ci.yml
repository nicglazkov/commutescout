name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,demo]" -c constraints.txt
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: Dependency vulnerability audit
        run: |
          pip install pip-audit
          # Audit the exact pinned dependency set that ships. --strict
          # fails the build on any known-vulnerable OR un-auditable
          # dependency, so a CVE can never ship silently. Auditing the
          # constraints file (not the live env) avoids choking on the
          # local editable package, which is not on PyPI.
          pip-audit --strict -r constraints.txt
